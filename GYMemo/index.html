<!DOCTYPE html>
<html lang="ko" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMemo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Record Tab -->
        <div id="recordTab">
            <div id="mainPage">
                <header>
                    <h1>GYMemo</h1>
                    <div class="view-toggle">
                        <button id="calendarViewBtn" class="active">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                        </button>
                        <button id="listViewBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="8" y1="6" x2="21" y2="6"/>
                                <line x1="8" y1="12" x2="21" y2="12"/>
                                <line x1="8" y1="18" x2="21" y2="18"/>
                                <line x1="3" y1="6" x2="3.01" y2="6"/>
                                <line x1="3" y1="12" x2="3.01" y2="12"/>
                                <line x1="3" y1="18" x2="3.01" y2="18"/>
                            </svg>
                        </button>
                    </div>
                </header>

                <!-- Calendar View -->
                <div id="calendarView">
                    <div class="calendar" id="calendarContainer">
                        <div class="calendar-header">
                            <button class="calendar-title-btn" id="calendarTitleBtn">2024년 1월</button>
                            <div class="calendar-nav">
                                <button class="today-btn" id="todayBtn" data-i18n="today">오늘</button>
                                <button id="prevMonth">‹</button>
                                <button id="nextMonth">›</button>
                            </div>
                        </div>
                        <div class="calendar-weekdays" id="calendarWeekdays">
                            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
                        </div>
                        <div class="calendar-days" id="calendarDays"></div>
                    </div>

                    <div class="day-detail hidden" id="dayDetail">
                        <div class="day-detail-header">
                            <h3 id="dayDetailTitle">1월 1일</h3>
                            <button class="day-detail-close" id="closeDayDetail">×</button>
                        </div>
                        <div class="day-exercises" id="dayExercises"></div>
                        <button class="day-add-btn" id="dayAddBtn" data-i18n="addRecord">+ 기록 추가</button>
                    </div>

                </div>

                <!-- List View -->
                <div id="listView" class="hidden">
                    <div class="feed-view" id="feedView"></div>
                </div>

            </div>

            <!-- Detail Page -->
            <div id="detailPage" class="hidden">
                <header>
                    <button class="back-btn" id="backBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <h1 id="detailTitle" class="editable-title" data-i18n="exerciseName">운동명</h1>
                    <button class="edit-btn" id="editTitleBtn">✏️</button>
                </header>
                <div class="exercise-memo-display hidden" id="exerciseMemoDisplay"></div>

                <!-- 캘린더에서 접근 시 보이는 버튼 -->
                <button class="add-record-toggle-btn hidden" id="addRecordToggleBtn" data-i18n="addRecord">+ 기록 추가</button>

                <!-- 입력 폼 영역 -->
                <div id="inputFormArea">
                    <div class="date-row">
                        <input type="date" id="dateInput">
                    </div>
                    <div class="input-row">
                        <input type="number" id="weightInput" placeholder="kg" inputmode="decimal">
                        <input type="number" id="repsInput" placeholder="reps" inputmode="numeric">
                    </div>
                    <div class="memo-row">
                        <input type="text" id="setMemo" data-i18n="setMemo" placeholder="세트 메모 (선택)">
                    </div>
                    <button class="add-set-btn" id="addSetBtn">Add Set</button>
                </div>

                <div class="history-header">
                    <span class="history-title" data-i18n="record">기록</span>
                    <button class="history-toggle-btn" id="historyToggleBtn">
                        <span id="historyToggleText" data-i18n="show">보기</span>
                        <span class="history-toggle-icon" id="historyToggleIcon">▼</span>
                    </button>
                </div>
                <div class="set-list-container hidden" id="setListContainer">
                    <div id="setList"></div>
                    <div class="load-more-indicator hidden" id="loadMoreIndicator" data-i18n="loading">불러오는 중...</div>
                </div>
            </div>
        </div>

        <!-- Chart Tab -->
        <div id="chartTab" class="hidden">
            <header><h1 data-i18n="tabChart">차트</h1></header>
            <select class="chart-select" id="chartExerciseSelect">
                <option value="" data-i18n="selectExercise">운동을 선택하세요</option>
            </select>
            <div class="chart-period-selector" id="chartPeriodSelector">
                <button class="chart-period-btn active" data-period="week" data-i18n="thisWeek">금주</button>
                <button class="chart-period-btn" data-period="1month" data-i18n="oneMonth">1개월</button>
                <button class="chart-period-btn" data-period="3month" data-i18n="threeMonths">3개월</button>
                <button class="chart-period-btn" data-period="6month" data-i18n="sixMonths">6개월</button>
                <button class="chart-period-btn" data-period="1year" data-i18n="oneYear">1년</button>
                <button class="chart-period-btn" data-period="custom" data-i18n="custom">커스텀</button>
            </div>
            <div id="chartContent" class="hidden">
                <div class="chart-section">
                    <h3 data-i18n="weightTrend">무게 변화 추이</h3>
                    <div class="chart-container">
                        <div class="line-chart" id="weightChart"></div>
                    </div>
                </div>
                <div class="chart-section">
                    <h3 data-i18n="dailyVolume">일별 볼륨 (kg × reps)</h3>
                    <div class="chart-container">
                        <div class="bar-chart" id="volumeChart"></div>
                    </div>
                </div>
            </div>
            <div id="chartEmpty" class="empty" data-i18n="chartEmpty">운동을 선택하면 차트가 표시됩니다</div>
        </div>

        <!-- MY Tab -->
        <div id="myTab" class="hidden">
            <!-- Hub -->
            <div id="myHub">
                <header><h1 data-i18n="tabMy">MY</h1></header>
                <div class="my-hub-list">
                    <button class="my-hub-item" data-subroute="profile">
                        <svg class="my-hub-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span data-i18n="myProfile">프로필</span>
                        <svg class="my-hub-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                    <button class="my-hub-item" data-subroute="achievement">
                        <svg class="my-hub-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 9H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h2"/><path d="M18 9h2a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2"/><path d="M4 22h16"/><path d="M10 22V18"/><path d="M14 22v-4"/><path d="M6 3v7a6 6 0 0 0 12 0V3H6z"/>
                        </svg>
                        <span data-i18n="tabAchievement">업적</span>
                        <svg class="my-hub-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                    <button class="my-hub-item" data-subroute="routines">
                        <svg class="my-hub-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 6v6l4 2"/>
                        </svg>
                        <span>AI 루틴</span>
                        <svg class="my-hub-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                    <button class="my-hub-item" data-subroute="appsettings">
                        <svg class="my-hub-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                        <span data-i18n="appSettings">앱 설정</span>
                        <svg class="my-hub-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </button>
                </div>
            </div>

            <!-- 프로필 서브페이지 -->
            <div id="myProfilePage" class="my-subpage hidden">
                <header>
                    <button class="back-btn" id="mySubBackBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h1 data-i18n="myProfile">프로필</h1>
                </header>
                <div class="my-subpage-content">
                    <div class="profile-group">
                        <label class="profile-label">목표</label>
                        <div class="profile-chips">
                            <button class="profile-chip" data-field="goal" data-value="다이어트">다이어트</button>
                            <button class="profile-chip" data-field="goal" data-value="근육증가">근육증가</button>
                            <button class="profile-chip" data-field="goal" data-value="체력향상">체력향상</button>
                        </div>
                        <input type="text" class="profile-input" data-field="goal" placeholder="목표를 입력하세요" maxlength="50">
                    </div>
                    <div class="profile-group">
                        <label class="profile-label">수준</label>
                        <div class="profile-chips">
                            <button class="profile-chip" data-field="level" data-value="초보">초보</button>
                            <button class="profile-chip" data-field="level" data-value="중급">중급</button>
                            <button class="profile-chip" data-field="level" data-value="고급">고급</button>
                        </div>
                        <input type="text" class="profile-input" data-field="level" placeholder="운동 수준을 입력하세요" maxlength="30">
                    </div>
                    <div class="profile-group">
                        <label class="profile-label">주당 운동</label>
                        <div class="profile-chips">
                            <button class="profile-chip" data-field="frequency" data-value="주 2-3회">주 2-3회</button>
                            <button class="profile-chip" data-field="frequency" data-value="주 4-5회">주 4-5회</button>
                            <button class="profile-chip" data-field="frequency" data-value="주 6-7회">주 6-7회</button>
                        </div>
                        <input type="text" class="profile-input" data-field="frequency" placeholder="예: 주 1회, 격일" maxlength="30">
                    </div>
                    <div class="profile-group">
                        <label class="profile-label">장비/환경</label>
                        <div class="profile-chips">
                            <button class="profile-chip" data-field="equipment" data-value="헬스장">헬스장</button>
                            <button class="profile-chip" data-field="equipment" data-value="홈짐">홈짐</button>
                            <button class="profile-chip" data-field="equipment" data-value="맨몸">맨몸</button>
                        </div>
                        <input type="text" class="profile-input" data-field="equipment" placeholder="예: 공원, 수영장" maxlength="30">
                    </div>
                    <div class="profile-group">
                        <label class="profile-label">성별</label>
                        <div class="profile-chips">
                            <button class="profile-chip" data-field="gender" data-value="남">남</button>
                            <button class="profile-chip" data-field="gender" data-value="여">여</button>
                        </div>
                    </div>
                    <div class="profile-group">
                        <label class="profile-label">나이</label>
                        <div class="profile-chips">
                            <button class="profile-chip" data-field="age" data-value="10대">10대</button>
                            <button class="profile-chip" data-field="age" data-value="20대">20대</button>
                            <button class="profile-chip" data-field="age" data-value="30대">30대</button>
                            <button class="profile-chip" data-field="age" data-value="40대">40대</button>
                            <button class="profile-chip" data-field="age" data-value="50대+">50대+</button>
                        </div>
                        <input type="number" class="profile-input" data-field="ageExact" placeholder="정확한 나이 (선택)" min="10" max="100" inputmode="numeric">
                    </div>
                    <div class="profile-group">
                        <label class="profile-label">부상/주의</label>
                        <div class="profile-chips">
                            <button class="profile-chip" data-field="injuries" data-value="없음">없음</button>
                            <button class="profile-chip" data-field="injuries" data-value="허리">허리</button>
                            <button class="profile-chip" data-field="injuries" data-value="무릎">무릎</button>
                            <button class="profile-chip" data-field="injuries" data-value="어깨">어깨</button>
                        </div>
                        <input type="text" class="profile-input" data-field="injuries" placeholder="기타 부상/주의사항" maxlength="50">
                    </div>
                    <div class="profile-group profile-group-note">
                        <label class="profile-label">추가사항</label>
                        <textarea class="profile-input profile-textarea" data-field="notes" placeholder="AI에게 전달할 추가 정보를 자유롭게 적어주세요&#10;예: 런닝머신은 무릎에 무리라 피하고 싶어요" maxlength="300"></textarea>
                        <div class="profile-note-count"><span id="profileNotesCount">0</span>/300</div>
                    </div>
                </div>
                <div class="profile-ai-section">
                    <button class="profile-ai-btn" id="generateRoutineBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                        AI 루틴 생성
                    </button>
                </div>
            </div>

            <!-- AI 루틴 서브페이지 -->
            <div id="myRoutinesPage" class="my-subpage hidden">
                <header>
                    <button class="back-btn" id="myRoutinesBackBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h1>AI 루틴</h1>
                </header>
                <div class="routine-list-container" id="routineListContainer"></div>
            </div>

            <!-- 루틴 상세 페이지 -->
            <div id="myRoutineDetailPage" class="my-subpage hidden">
                <header>
                    <button class="back-btn" id="myRoutineDetailBackBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h1>루틴 상세</h1>
                    <button class="icon-btn routine-delete-btn" id="routineDeleteBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </header>
                <div class="routine-detail-container" id="routineDetailContainer"></div>
            </div>

            <!-- 업적 서브페이지 -->
            <div id="myAchievementPage" class="my-subpage hidden">
                <header>
                    <button class="back-btn" id="myAchBackBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h1 data-i18n="tabAchievement">업적</h1>
                </header>
                <div class="achievement-summary" id="achievementSummary"></div>
                <div class="achievement-list" id="achievementList"></div>
            </div>

            <!-- 앱 설정 서브페이지 -->
            <div id="myAppSettingsPage" class="my-subpage hidden">
                <header>
                    <button class="back-btn" id="mySettingsSubBackBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <h1 data-i18n="appSettings">앱 설정</h1>
                </header>
                <div class="menu-list">
                    <div class="menu-section">
                        <h3 class="menu-section-title" data-i18n="language">언어</h3>
                        <div class="language-selector">
                            <button class="lang-btn" data-lang="ko">한국어</button>
                            <button class="lang-btn" data-lang="en">English</button>
                        </div>
                    </div>
                    <div class="menu-section">
                        <h3 class="menu-section-title" data-i18n="weightUnitLabel">무게 단위</h3>
                        <div class="unit-selector">
                            <button class="unit-btn" data-unit="kg">kg</button>
                            <button class="unit-btn" data-unit="lb">lb</button>
                        </div>
                    </div>
                    <div class="menu-section">
                        <h3 class="menu-section-title" data-i18n="dataManagement">데이터 관리</h3>
                        <button class="menu-item" id="loadDataBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <span data-i18n="loadData">데이터 불러오기</span>
                        </button>
                        <button class="menu-item" id="exportDataBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            <span data-i18n="exportData">데이터 내보내기</span>
                        </button>
                        <button class="menu-item menu-item-danger" id="resetDataBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                <line x1="10" y1="11" x2="10" y2="17"/>
                                <line x1="14" y1="11" x2="14" y2="17"/>
                            </svg>
                            <span data-i18n="resetData">데이터 초기화</span>
                        </button>
                    </div>
                </div>
                <input type="file" id="fileInput" accept=".hlog,.json,application/json,application/octet-stream,*/*" class="hidden">
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settingsTab" class="hidden">
            <header>
                <button class="back-btn hidden" id="settingsBackBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <h1 data-i18n="tabSettings">운동</h1>
                <div class="header-spacer"></div>
            </header>
            <div class="sub-tab-bar">
                <button class="sub-tab active" data-subtab="exercises" data-i18n="exercises">운동</button>
                <button class="sub-tab" data-subtab="templates" data-i18n="templates">템플릿</button>
            </div>
            <!-- 운동 서브탭 -->
            <div id="exercisesPane">
                <div class="search-row">
                    <input type="text" id="exerciseSearch" data-i18n="searchExercise" placeholder="운동 검색">
                </div>
                <div class="sort-toggle" id="sortToggle">
                    <button class="sort-btn active" data-sort="registered" data-i18n="sortByRegistered">등록순</button>
                    <button class="sort-btn" data-sort="name" data-i18n="sortByName">가나다순</button>
                </div>
                <div class="list" id="exerciseList"></div>
            </div>
            <!-- 템플릿 서브탭 -->
            <div id="templatesPane" class="hidden">
                <div class="search-row">
                    <input type="text" id="templateSearch" data-i18n="searchTemplate" placeholder="템플릿 검색">
                </div>
                <div class="sort-toggle" id="templateSortToggle">
                    <button class="sort-btn active" data-sort="registered" data-i18n="sortByRegistered">등록순</button>
                    <button class="sort-btn" data-sort="name" data-i18n="sortByName">가나다순</button>
                </div>
                <div class="list" id="templateList"></div>
            </div>
        </div>
    </div>

    <!-- Add Exercise Page -->
    <div class="add-exercise-page hidden" id="addExercisePage">
        <header>
            <button class="back-btn" id="closeAddExercise">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <h1 data-i18n="addExercise">운동 추가</h1>
        </header>
        <div class="add-exercise-form">
            <div class="name-color-row">
                <button type="button" class="color-preview-btn" id="colorPreviewBtn"></button>
                <input type="text" id="newExerciseName" data-i18n="enterExerciseName" placeholder="운동 이름을 입력하세요">
            </div>
            <div class="form-group">
                <label data-i18n="memo">메모</label>
                <textarea id="newExerciseMemo" data-i18n="enterExerciseDesc" placeholder="운동에 대한 설명을 입력하세요" rows="3"></textarea>
            </div>
            <button class="submit-btn" id="submitAddExercise" data-i18n="addExerciseBtn">추가하기</button>
        </div>
    </div>

    <!-- Add Template Page -->
    <div class="add-exercise-page hidden" id="addTemplatePage">
        <header>
            <button class="back-btn" id="closeAddTemplate">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <h1 data-i18n="addTemplate">템플릿 추가</h1>
        </header>
        <div class="add-template-form">
            <div class="form-group">
                <input type="text" id="newTemplateName" data-i18n="enterTemplateName" placeholder="템플릿 이름을 입력하세요" class="template-name-input">
            </div>
            <div class="form-group">
                <textarea id="newTemplateMemo" placeholder="메모 (선택사항)" class="template-memo-input" rows="2"></textarea>
            </div>
            <div class="template-section-label" data-i18n="selectedExercises">선택된 운동</div>
            <div id="templateOrderList" class="template-order-list">
                <div class="template-order-empty" data-i18n="tapToAddExercise">아래에서 운동을 선택하세요</div>
            </div>
            <div class="template-section-label" data-i18n="addExercise">운동 선택</div>
            <div id="templateExercisePicker" class="template-exercise-picker"></div>
            <button class="submit-btn" id="submitAddTemplate" data-i18n="addTemplateBtn">추가하기</button>
        </div>
    </div>

    <!-- Add Record Action Sheet -->
    <div class="bottom-sheet-overlay hidden" id="addRecordSheet">
        <div class="bottom-sheet">
            <div class="bottom-sheet-handle"></div>
            <div class="bottom-sheet-title">기록 추가</div>
            <label class="radio-sheet-item" id="sheetChooseExercise">
                <div class="radio-sheet-info">
                    <div class="radio-sheet-label">운동 선택</div>
                    <div class="radio-sheet-sub">등록된 운동 목록에서 선택</div>
                </div>
                <div class="radio-dot" id="radioDotExercise"></div>
            </label>
            <label class="radio-sheet-item" id="sheetChooseTemplate">
                <div class="radio-sheet-info">
                    <div class="radio-sheet-label">템플릿 선택</div>
                    <div class="radio-sheet-sub">템플릿 내 운동 한 번에 등록</div>
                </div>
                <div class="radio-dot" id="radioDotTemplate"></div>
            </label>
            <button class="bottom-sheet-confirm" id="sheetConfirm">확인</button>
            <button class="bottom-sheet-cancel" id="sheetCancel">취소</button>
        </div>
    </div>

    <!-- Template Picker Sheet -->
    <div class="bottom-sheet-overlay hidden" id="templatePickerSheet">
        <div class="bottom-sheet">
            <div class="bottom-sheet-handle"></div>
            <div class="bottom-sheet-title">템플릿 선택</div>
            <div id="templatePickerList"></div>
            <button class="bottom-sheet-cancel" id="templatePickerCancel">취소</button>
        </div>
    </div>

    <!-- Color Picker Modal -->
    <div class="modal-overlay" id="colorPickerModal">
        <div class="modal-content color-picker-content">
            <div class="modal-header">
                <h3 data-i18n="selectColor">색상 선택</h3>
                <button class="modal-close" id="closeColorPicker">×</button>
            </div>
            <div class="color-picker-grid" id="colorPickerGrid"></div>
        </div>
    </div>

    <!-- 운동 수정 바텀시트 -->
    <div class="bottom-sheet-overlay hidden" id="exerciseEditSheet">
        <div class="bottom-sheet">
            <div class="exercise-edit-color-row">
                <button class="exercise-edit-color-btn" id="exerciseEditColorBtn"></button>
                <span class="exercise-edit-color-label">색상</span>
            </div>
            <div class="exercise-edit-field">
                <label class="exercise-edit-label">운동 이름</label>
                <input type="text" class="exercise-edit-input" id="exerciseEditNameInput" maxlength="30">
            </div>
            <div class="exercise-edit-field">
                <label class="exercise-edit-label">설명</label>
                <textarea class="exercise-edit-input exercise-edit-textarea" id="exerciseEditMemoInput" maxlength="200" placeholder="운동 설명을 입력하세요"></textarea>
            </div>
            <button class="bottom-sheet-confirm" id="exerciseEditSaveBtn">저장</button>
            <button class="bottom-sheet-cancel" id="exerciseEditCancelBtn">취소</button>
        </div>
    </div>

    <!-- Month Picker Modal -->
    <div class="modal-overlay" id="monthPickerModal">
        <div class="modal-content month-picker-content">
            <div class="modal-header">
                <h3 data-i18n="selectDate">날짜 선택</h3>
                <button class="modal-close" id="closeMonthPicker">×</button>
            </div>
            <div class="year-scroll-container" id="yearScrollContainer">
                <div class="year-grid" id="yearGrid"></div>
            </div>
            <div class="month-grid" id="monthGrid"></div>
        </div>
    </div>

    <!-- Set Edit Modal -->
    <div class="modal-overlay" id="setEditModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="editSet">세트 수정</h3>
                <button class="modal-close" id="closeSetEdit">×</button>
            </div>
            <div class="set-edit-form">
                <div class="form-group">
                    <label data-i18n="weightKg">무게 (kg)</label>
                    <input type="number" id="editWeight" inputmode="decimal">
                </div>
                <div class="form-group">
                    <label data-i18n="reps">횟수</label>
                    <input type="number" id="editReps" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label data-i18n="memo">메모</label>
                    <input type="text" id="editSetMemo" data-i18n="memoOptional" placeholder="메모 (선택)">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel" id="cancelSetEdit" data-i18n="cancel">취소</button>
                    <button class="modal-btn save" id="saveSetEdit" data-i18n="save">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Alert/Confirm Modal -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-content custom-modal-content">
            <div class="custom-modal-body">
                <div class="custom-modal-icon" id="customModalIcon"></div>
                <div class="custom-modal-message" id="customModalMessage"></div>
            </div>
            <div class="custom-modal-actions" id="customModalActions"></div>
        </div>
    </div>

    <!-- Custom Date Modal -->
    <div class="modal-overlay" id="customDateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="selectPeriod">기간 선택</h3>
                <button class="modal-close" id="closeCustomDateModal">×</button>
            </div>
            <div class="custom-date-form">
                <div class="form-group">
                    <label data-i18n="startDate">시작일</label>
                    <input type="date" id="chartStartDate">
                </div>
                <div class="form-group">
                    <label data-i18n="endDate">종료일</label>
                    <input type="date" id="chartEndDate">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel" id="cancelCustomDate" data-i18n="cancel">취소</button>
                    <button class="modal-btn save" id="applyCustomDate" data-i18n="apply">적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab hidden" id="fabAddExercise">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
    </button>

    <!-- Tab Bar -->
    <nav class="tab-bar">
        <button class="tab-item" data-tab="chart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 20V10M12 20V4M6 20v-6"/>
            </svg>
            <span data-i18n="tabChart">차트</span>
        </button>
        <button class="tab-item active" data-tab="record">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span data-i18n="tabRecord">기록</span>
        </button>
        <button class="tab-item" data-tab="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 14L14 10"/>
                <rect x="5" y="13" width="4" height="6" rx="1" transform="rotate(-45 7 16)"/>
                <rect x="15" y="5" width="4" height="6" rx="1" transform="rotate(-45 17 8)"/>
            </svg>
            <span data-i18n="tabSettings">운동</span>
        </button>
        <button class="tab-item" data-tab="my">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span data-i18n="tabMy">MY</span>
        </button>
    </nav>

    <!-- JS 모듈 (순서 중요) -->
    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/record.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/achievement.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/template.js"></script>
    <script src="js/routine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
