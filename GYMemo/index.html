<!DOCTYPE html>
<html lang="ko" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMemo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Record Tab -->
        <div id="recordTab">
            <div id="mainPage">
                <header>
                    <h1>GYMemo</h1>
                    <div class="view-toggle">
                        <button id="calendarViewBtn" class="active">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                        </button>
                        <button id="listViewBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="8" y1="6" x2="21" y2="6"/>
                                <line x1="8" y1="12" x2="21" y2="12"/>
                                <line x1="8" y1="18" x2="21" y2="18"/>
                                <line x1="3" y1="6" x2="3.01" y2="6"/>
                                <line x1="3" y1="12" x2="3.01" y2="12"/>
                                <line x1="3" y1="18" x2="3.01" y2="18"/>
                            </svg>
                        </button>
                    </div>
                </header>

                <!-- Calendar View -->
                <div id="calendarView">
                    <div class="calendar" id="calendarContainer">
                        <div class="calendar-header">
                            <button class="calendar-title-btn" id="calendarTitleBtn">2024년 1월</button>
                            <div class="calendar-nav">
                                <button class="today-btn" id="todayBtn" data-i18n="today">오늘</button>
                                <button id="prevMonth">‹</button>
                                <button id="nextMonth">›</button>
                            </div>
                        </div>
                        <div class="calendar-weekdays" id="calendarWeekdays">
                            <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
                        </div>
                        <div class="calendar-days" id="calendarDays"></div>
                    </div>

                    <div class="day-detail hidden" id="dayDetail">
                        <div class="day-detail-header">
                            <h3 id="dayDetailTitle">1월 1일</h3>
                            <button class="day-detail-close" id="closeDayDetail">×</button>
                        </div>
                        <div class="day-exercises" id="dayExercises"></div>
                        <button class="day-add-btn" id="dayAddBtn" data-i18n="addRecord">+ 기록 추가</button>
                    </div>

                </div>

                <!-- List View -->
                <div id="listView" class="hidden">
                    <div class="feed-view" id="feedView"></div>
                </div>

            </div>

            <!-- Detail Page -->
            <div id="detailPage" class="hidden">
                <header>
                    <button class="back-btn" id="backBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <h1 id="detailTitle" class="editable-title" data-i18n="exerciseName">운동명</h1>
                    <button class="edit-btn" id="editTitleBtn">✏️</button>
                </header>
                <div class="exercise-memo-display hidden" id="exerciseMemoDisplay"></div>

                <!-- 캘린더에서 접근 시 보이는 버튼 -->
                <button class="add-record-toggle-btn hidden" id="addRecordToggleBtn" data-i18n="addRecord">+ 기록 추가</button>

                <!-- 입력 폼 영역 -->
                <div id="inputFormArea">
                    <div class="date-row">
                        <input type="date" id="dateInput">
                    </div>
                    <div class="input-row">
                        <input type="number" id="weightInput" placeholder="kg" inputmode="decimal">
                        <input type="number" id="repsInput" placeholder="reps" inputmode="numeric">
                    </div>
                    <div class="memo-row">
                        <input type="text" id="setMemo" data-i18n="setMemo" placeholder="세트 메모 (선택)">
                    </div>
                    <button class="add-set-btn" id="addSetBtn">Add Set</button>
                </div>

                <div class="history-header">
                    <span class="history-title" data-i18n="record">기록</span>
                    <button class="history-toggle-btn" id="historyToggleBtn">
                        <span id="historyToggleText" data-i18n="show">보기</span>
                        <span class="history-toggle-icon" id="historyToggleIcon">▼</span>
                    </button>
                </div>
                <div class="set-list-container hidden" id="setListContainer">
                    <div id="setList"></div>
                    <div class="load-more-indicator hidden" id="loadMoreIndicator" data-i18n="loading">불러오는 중...</div>
                </div>
            </div>
        </div>

        <!-- Chart Tab -->
        <div id="chartTab" class="hidden">
            <header><h1 data-i18n="tabChart">차트</h1></header>
            <select class="chart-select" id="chartExerciseSelect">
                <option value="" data-i18n="selectExercise">운동을 선택하세요</option>
            </select>
            <div class="chart-period-selector" id="chartPeriodSelector">
                <button class="chart-period-btn active" data-period="week" data-i18n="thisWeek">금주</button>
                <button class="chart-period-btn" data-period="1month" data-i18n="oneMonth">1개월</button>
                <button class="chart-period-btn" data-period="3month" data-i18n="threeMonths">3개월</button>
                <button class="chart-period-btn" data-period="6month" data-i18n="sixMonths">6개월</button>
                <button class="chart-period-btn" data-period="1year" data-i18n="oneYear">1년</button>
                <button class="chart-period-btn" data-period="custom" data-i18n="custom">커스텀</button>
            </div>
            <div id="chartContent" class="hidden">
                <div class="chart-section">
                    <h3 data-i18n="weightTrend">무게 변화 추이</h3>
                    <div class="chart-container">
                        <div class="line-chart" id="weightChart"></div>
                    </div>
                </div>
                <div class="chart-section">
                    <h3 data-i18n="dailyVolume">일별 볼륨 (kg × reps)</h3>
                    <div class="chart-container">
                        <div class="bar-chart" id="volumeChart"></div>
                    </div>
                </div>
            </div>
            <div id="chartEmpty" class="empty" data-i18n="chartEmpty">운동을 선택하면 차트가 표시됩니다</div>
        </div>

        <!-- Achievement Tab -->
        <div id="achievementTab" class="hidden">
            <header><h1 data-i18n="tabAchievement">업적</h1></header>
            <div class="achievement-summary" id="achievementSummary"></div>
            <div class="achievement-list" id="achievementList"></div>
        </div>

        <!-- Menu Tab -->
        <div id="menuTab" class="hidden">
            <header><h1 data-i18n="tabMenu">설정</h1></header>
            <div class="menu-list">
                <div class="menu-section">
                    <h3 class="menu-section-title" data-i18n="language">언어</h3>
                    <div class="language-selector">
                        <button class="lang-btn" data-lang="ko">한국어</button>
                        <button class="lang-btn" data-lang="en">English</button>
                    </div>
                </div>
                <div class="menu-section">
                    <h3 class="menu-section-title" data-i18n="weightUnitLabel">무게 단위</h3>
                    <div class="unit-selector">
                        <button class="unit-btn" data-unit="kg">kg</button>
                        <button class="unit-btn" data-unit="lb">lb</button>
                    </div>
                </div>
                <div class="menu-section">
                    <h3 class="menu-section-title" data-i18n="dataManagement">데이터 관리</h3>
                    <button class="menu-item" id="loadDataBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <span data-i18n="loadData">데이터 불러오기</span>
                    </button>
                    <button class="menu-item" id="exportDataBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span data-i18n="exportData">데이터 내보내기</span>
                    </button>
                    <button class="menu-item menu-item-danger" id="resetDataBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            <line x1="10" y1="11" x2="10" y2="17"/>
                            <line x1="14" y1="11" x2="14" y2="17"/>
                        </svg>
                        <span data-i18n="resetData">데이터 초기화</span>
                    </button>
                </div>
            </div>
            <input type="file" id="fileInput" accept=".hlog,.json,application/json,application/octet-stream,*/*" class="hidden">
        </div>

        <!-- Settings Tab -->
        <div id="settingsTab" class="hidden">
            <header>
                <button class="back-btn hidden" id="settingsBackBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <h1 data-i18n="tabSettings">운동 설정</h1>
                <button class="header-add-btn" id="openAddExercise">+</button>
            </header>
            <div class="search-row">
                <input type="text" id="exerciseSearch" data-i18n="searchExercise" placeholder="운동 검색">
            </div>
            <div class="sort-toggle" id="sortToggle">
                <button class="sort-btn active" data-sort="registered" data-i18n="sortByRegistered">등록순</button>
                <button class="sort-btn" data-sort="name" data-i18n="sortByName">가나다순</button>
            </div>
            <div class="list" id="exerciseList"></div>
        </div>
    </div>

    <!-- Add Exercise Page -->
    <div class="add-exercise-page hidden" id="addExercisePage">
        <header>
            <button class="back-btn" id="closeAddExercise">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <h1 data-i18n="addExercise">운동 추가</h1>
        </header>
        <div class="add-exercise-form">
            <div class="name-color-row">
                <button type="button" class="color-preview-btn" id="colorPreviewBtn"></button>
                <input type="text" id="newExerciseName" data-i18n="enterExerciseName" placeholder="운동 이름을 입력하세요">
            </div>
            <div class="form-group">
                <label data-i18n="memo">메모</label>
                <textarea id="newExerciseMemo" data-i18n="enterExerciseDesc" placeholder="운동에 대한 설명을 입력하세요" rows="3"></textarea>
            </div>
            <button class="submit-btn" id="submitAddExercise" data-i18n="addExerciseBtn">추가하기</button>
        </div>
    </div>

    <!-- Color Picker Modal -->
    <div class="modal-overlay" id="colorPickerModal">
        <div class="modal-content color-picker-content">
            <div class="modal-header">
                <h3 data-i18n="selectColor">색상 선택</h3>
                <button class="modal-close" id="closeColorPicker">×</button>
            </div>
            <div class="color-picker-grid" id="colorPickerGrid"></div>
        </div>
    </div>

    <!-- Month Picker Modal -->
    <div class="modal-overlay" id="monthPickerModal">
        <div class="modal-content month-picker-content">
            <div class="modal-header">
                <h3 data-i18n="selectDate">날짜 선택</h3>
                <button class="modal-close" id="closeMonthPicker">×</button>
            </div>
            <div class="year-scroll-container" id="yearScrollContainer">
                <div class="year-grid" id="yearGrid"></div>
            </div>
            <div class="month-grid" id="monthGrid"></div>
        </div>
    </div>

    <!-- Set Edit Modal -->
    <div class="modal-overlay" id="setEditModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="editSet">세트 수정</h3>
                <button class="modal-close" id="closeSetEdit">×</button>
            </div>
            <div class="set-edit-form">
                <div class="form-group">
                    <label data-i18n="weightKg">무게 (kg)</label>
                    <input type="number" id="editWeight" inputmode="decimal">
                </div>
                <div class="form-group">
                    <label data-i18n="reps">횟수</label>
                    <input type="number" id="editReps" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label data-i18n="memo">메모</label>
                    <input type="text" id="editSetMemo" data-i18n="memoOptional" placeholder="메모 (선택)">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel" id="cancelSetEdit" data-i18n="cancel">취소</button>
                    <button class="modal-btn save" id="saveSetEdit" data-i18n="save">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Alert/Confirm Modal -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-content custom-modal-content">
            <div class="custom-modal-body">
                <div class="custom-modal-icon" id="customModalIcon"></div>
                <div class="custom-modal-message" id="customModalMessage"></div>
            </div>
            <div class="custom-modal-actions" id="customModalActions"></div>
        </div>
    </div>

    <!-- Custom Date Modal -->
    <div class="modal-overlay" id="customDateModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="selectPeriod">기간 선택</h3>
                <button class="modal-close" id="closeCustomDateModal">×</button>
            </div>
            <div class="custom-date-form">
                <div class="form-group">
                    <label data-i18n="startDate">시작일</label>
                    <input type="date" id="chartStartDate">
                </div>
                <div class="form-group">
                    <label data-i18n="endDate">종료일</label>
                    <input type="date" id="chartEndDate">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel" id="cancelCustomDate" data-i18n="cancel">취소</button>
                    <button class="modal-btn save" id="applyCustomDate" data-i18n="apply">적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
        <button class="tab-item" data-tab="chart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 20V10M12 20V4M6 20v-6"/>
            </svg>
            <span data-i18n="tabChart">차트</span>
        </button>
        <button class="tab-item" data-tab="achievement">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 9H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h2"/>
                <path d="M18 9h2a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2"/>
                <path d="M4 22h16"/>
                <path d="M10 22V18"/>
                <path d="M14 22v-4"/>
                <path d="M6 3v7a6 6 0 0 0 12 0V3H6z"/>
            </svg>
            <span data-i18n="tabAchievement">업적</span>
        </button>
        <button class="tab-item active" data-tab="record">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span data-i18n="tabRecord">기록</span>
        </button>
        <button class="tab-item" data-tab="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 14L14 10"/>
                <rect x="5" y="13" width="4" height="6" rx="1" transform="rotate(-45 7 16)"/>
                <rect x="15" y="5" width="4" height="6" rx="1" transform="rotate(-45 17 8)"/>
            </svg>
            <span data-i18n="tabSettings">운동</span>
        </button>
        <button class="tab-item" data-tab="menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span data-i18n="tabMenu">설정</span>
        </button>
    </nav>

    <!-- JS 모듈 (순서 중요) -->
    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/record.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/achievement.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
